# Curated amateur band-plan data for fldigi-mcp Band Guidance (EXPERIMENTAL).
#
# Purpose: advisory guidance only. These are voluntary IARU band plans, NOT
# regulations, and they differ by region. Always defer to national regulations.
#
# Units: all frequencies are in Hz (integers).
#
# Per band we record the spans Band Guidance actually reasons about:
#   edges_hz    - the band edges (widest extent in the plan)
#   cw_hz       - the CW portion (CW is digital but lives in the CW segment)
#   digital_hz  - the narrow-band data / "digimode" portion (where PSK/RTTY/
#                 Olivia/FT8/JT/MFSK etc. operate)
#   auto_data_hz- (optional) unattended / automatically-controlled data sub-band
#
# "watering_holes_hz" below are the internationally-coordinated digital calling
# frequencies. The weak-signal modes (FT8/JT65/WSPR) are globally harmonised and
# identical across regions; the text modes come from the widely-used "Preferred
# HF Frequencies of Popular Digital Text Modes" reference.
#
# Sources (see docs/band-guidance.md):
#   R1: IARU R1 HF Band Plan, effective 16 Oct 2020
#       https://www.iaru-r1.org/wp-content/uploads/2019/08/hf_r1_bandplan.pdf
#   R2: ARRL "Considerate Operator's Frequency Guide" (QST, Nov 2013), US usage
#       + IARU R2 band plan
#   R3: IARU R3 Interim Band Plan, doc R3-004, rev. 3 Sep 2019
#       https://www.iaru.org/wp-content/uploads/2020/01/R3-004-IARU-Region-3-Bandplan-rev.2.pdf

meta:
  version: 1
  updated: "2026-06-22"
  status: experimental
  disclaimer: >
    Voluntary IARU band plans, not regulations; region-specific and advisory
    only. Verify against your national regulations. Corrections welcome.

